<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Prime Reply Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>BMW Prime Reply Generator</h1>

    <div class="container">

        <h2>Your Signature</h2>
        <input id="signature" type="text" placeholder="Enter your signature...">

        <h2>Responses</h2>
        <textarea id="responses" placeholder="Enter one response per line..."></textarea>

        <button id="copyBtn">Copy Random Reply</button>
        <button id="nextBtn">Next Reply</button>

        <p id="status"></p>

    </div>

    <script src="script.js"></script>
</body>
</html>
